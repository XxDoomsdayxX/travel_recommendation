<!DOCTYPE html>
<html>
    <head>
        <title>Travel Companion</title>
        <link rel="stylesheet" href="contact.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
        
    </head>
    <body>
        <nav id="header">
            <div id="title">
                <h3>TravelCompanion</h3>
            </div>

            <div id="nav-links">
                <a href="travel_recommendation.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
            </div>
        </nav>

        <section id="main">
            <aside id="social">
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </aside>

            <section id="main-content">
                <section id="contact">
                    <h1>CONTACT US</h1>
                    <p>
                        Get in touch!
                    </p>
                </section>

                <section id="contact-form">
                    <form action="post">
                        <label for="name">Name</label>
                        <input type="text" name="name" placeholder="Enter your name"></input>
                        <br>
                        <label for="email">Email</label>
                        <input type="email" name="email" placeholder="Enter your email"></input>
                        <br>
                        <label for="name">Message</label>
                        <textarea name="message" id="message" cols="40" rows="10" placeholder="Enter your message"></textarea>
                        <br>
                        <button id="contact-submit" type="Submit">Submit</button>
                    </form>
                </section>
            </section>
        </section>
        
    </body>
</html>
