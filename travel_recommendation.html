<!DOCTYPE html>
<html>
    <head>
        <title>Travel Companion</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <nav id="header">
            <div id="title">
                <h3>TravelCompanion</h3>
            </div>

            <div id="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About Us</a>
                <a href="#contact">Contact Us</a>
            </div>
            
            <div id="search_bar">
                <input type="text" placeholder="Enter a destination or keyword">
                
                <div class="search-buttons">
                  <button>Search</button>
                  <button>Clear</button>
                </div>
            </div>
        </nav>

        <section id="main">
            <aside id="social">
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </aside>

            <div id="main-content">
                <h1>Explore Dream Destination</h1>
                <p>
                The Travel Recommendation App helps users explore popular travel destinations...
                </p>
                <button>Book Now</button>
            </div>
        </section>
    </body>
</html>
